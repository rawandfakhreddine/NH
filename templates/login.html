{% extends "base.html" %}

{% block content %}
<section class="form-section auth-page">
    <div class="form-container">
        <div class="auth-shell w3-card-4">
            <div class="auth-left">
                <span class="auth-kicker">Secure Access</span>
                <h1 data-i18n="login_title">Welcome Back</h1>
                <p class="auth-text" data-i18n="login_text">
                    Access your healthcare intelligence portal securely.
                </p>

                <div class="auth-feature-list">
                    <div class="auth-feature-item">Protected user session</div>
                    <div class="auth-feature-item">Authorized dashboard access</div>
                    <div class="auth-feature-item">Central healthcare workspace</div>
                </div>
            </div>

            <div class="auth-right">
                <div class="auth-form-head">
                    <h2>Login</h2>
                    <p>Enter your account credentials</p>
                </div>

                <form method="POST" class="auth-form w3-container">
                    <div class="auth-form-group">
                        <label class="auth-label" data-i18n="label_email">Email Address</label>
                        <input class="w3-input w3-border auth-input" type="email" name="email" required>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label" data-i18n="label_password">Password</label>
                        <input class="w3-input w3-border auth-input" type="password" name="password" required>
                    </div>

                    <button type="submit" class="primary-btn auth-submit-btn" data-i18n="btn_login">
                        Login
                    </button>
                </form>

                <p class="auth-switch-text">
                    <span data-i18n="no_account">Don't have an account?</span>
                    <a href="{{ url_for('auth.signup') }}" class="auth-switch-link" data-i18n="btn_signup">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
